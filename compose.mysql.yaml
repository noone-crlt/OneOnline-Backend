services:
  mysql:
    image: mysql:8.4
    container_name: book-area-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: book_area3
      MYSQL_USER: root
      MYSQL_PASSWORD: DONG04082006@@
      MYSQL_ROOT_PASSWORD: DONG04082006@@
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3307:3306"
    volumes:
      - book_area_mysql_data:/var/lib/mysql
      - ./src/main/resources/static/sql/book_area2.sql:/docker-entrypoint-initdb.d/01-book-area.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_book_area_password" ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  book_area_mysql_data:
